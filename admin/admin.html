<!DOCTYPE html>
<html lang="ha">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:#fff;
}
.container{
  max-width:800px;
  margin:20px auto;
  background:#1e293b;
  padding:20px;
  border-radius:10px;
}
h1{
  text-align:center;
}
input,textarea{
  width:100%;
  padding:10px;
  margin:10px 0;
  border:none;
  border-radius:5px;
  background:#334155;
  color:#fff;
}
button{
  padding:10px 15px;
  margin-top:10px;
  border:none;
  border-radius:5px;
  font-weight:bold;
  cursor:pointer;
}
button.publish{background:#22c55e;}
button.publish:hover{background:#16a34a;}
button.delete{background:#ef4444;}
button.delete:hover{background:#dc2626;}
button.logout{background:#f97316;}
button.logout:hover{background:#ea580c;}
#status{
  margin-top:10px;
  text-align:center;
}
.preview img{
  width:100%;
  border-radius:8px;
  margin-top:10px;
}
.post-list{
  margin-top:20px;
}
.post-item{
  background:#334155;
  padding:10px;
  margin-bottom:8px;
  border-radius:5px;
  cursor:pointer;
}
.post-item:hover{
  background:#3b5066;
}
</style>
</head>

<body>

<div class="container">
  <h1>📰 Admin Dashboard</h1>

  <form id="form">
    <input type="text" id="title" placeholder="News Title" required>
    <textarea id="content" placeholder="News Content" required></textarea>
    <input type="file" id="imageFile" accept="image/*">
    <div class="preview" id="preview"></div>
    <input type="text" id="slug" placeholder="Slug (auto)" readonly>
    <button type="submit" class="publish">Publish / Update</button>
    <button type="button" class="delete" onclick="deletePost()">Delete Post</button>
  </form>

  <button class="logout" onclick="logout()">Logout</button>
  <div id="status"></div>

  <div class="post-list" id="postList">
    <h3>📄 Existing Posts</h3>
  </div>
</div>'

<script>
// =======================
// PROTECT ADMIN
// =======================
if(localStorage.getItem("admin") !== "1"){
  window.location.href = "login.html";
}

// =======================
// LOGOUT
// =======================
function logout(){
  localStorage.removeItem("admin");
  window.location.href = "login.html";
}

// =======================
// SLUG
// =======================
function generateSlug(text){
  return text.toLowerCase()
    .replace(/[^a-z0-9]+/g,"-")
    .replace(/(^-|-$)/g,"");
}

document.getElementById("title").addEventListener("input", function(){
  if(!editMode){
    document.getElementById("slug").value = generateSlug(this.value);
  }
});

// =======================
// IMAGE
// =======================
let imageBase64 = "";

document.getElementById("imageFile").addEventListener("change", function(){
  const file = this.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = function(){
    imageBase64 = reader.result;
    document.getElementById("preview").innerHTML = `<img src="${imageBase64}">`;
  };
  reader.readAsDataURL(file);
});

// =======================
// STATE
// =======================
let editMode = false;
let currentSlug = "";

// =======================
// LOAD POSTS
// =======================
async function loadPostList(){
  try{
    const res = await fetch("https://raw.githubusercontent.com/akymsco/lgportal/main/myproject/blog/news/index.json");
    const posts = await res.json();

    const listEl = document.getElementById("postList");
    listEl.innerHTML = "<h3>📄 Existing Posts</h3>";

    posts.reverse().forEach(p=>{
      const div = document.createElement("div");
      div.className = "post-item";
      div.innerText = p.title;

      div.onclick = ()=> loadForEdit(p.slug);

      listEl.appendChild(div);
    });

  }catch(err){
    console.error(err);
  }
}

// =======================
// LOAD EDIT
// =======================
async function loadForEdit(slug){
  const res = await fetch(`https://raw.githubusercontent.com/akymsco/lgportal/main/myproject/blog/news/${slug}.json`);
  const post = await res.json();

  document.getElementById("title").value = post.title;
  document.getElementById("content").value = post.content;
  document.getElementById("slug").value = slug;

  imageBase64 = post.image || "";
  document.getElementById("preview").innerHTML = post.image ? `<img src="${post.image}">` : "";

  editMode = true;
  currentSlug = slug;

  document.getElementById("status").innerText = "✏️ Editing: " + slug;
}

// =======================
// DELETE
// =======================
async function deletePost(){
  if(!editMode){
    alert("Load post first!");
    return;
  }

  if(!confirm("Delete this post?")) return;

  try{
    const res = await fetch("/.netlify/functions/delete", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ slug: currentSlug })
    });

    const data = await res.json();

    if(data.success){
      alert("✅ Deleted!");
      resetForm();
      loadPostList();
    }else{
      alert("❌ " + (data.error || "Delete failed"));
    }

  }catch(err){
    alert("❌ " + err.message);
  }
}

// =======================
// RESET
// =======================
function resetForm(){
  document.getElementById("form").reset();
  document.getElementById("preview").innerHTML = "";
  document.getElementById("slug").value = "";
  imageBase64 = "";
  editMode = false;
  currentSlug = "";
}

// =======================
// SUBMIT
// =======================
const form = document.getElementById("form");
const statusBox = document.getElementById("status");

form.addEventListener("submit", async (e)=>{
  e.preventDefault();

  const title = document.getElementById("title").value;
  const content = document.getElementById("content").value;

  let slug = editMode ? currentSlug : generateSlug(title);

  statusBox.innerText = "⏳ Processing...";

  try{
    const endpoint = editMode 
      ? "/.netlify/functions/update" 
      : "/.netlify/functions/publish";

    const res = await fetch(endpoint,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        title,
        content,
        image: imageBase64,
        slug
      })
    });

    const data = await res.json();

    if(data.success){
      statusBox.innerText = editMode ? "✅ Updated!" : "✅ Published!";
      resetForm();
      loadPostList();
    }else{
      statusBox.innerText = "❌ " + (data.error || "Failed");
    }

  }catch(err){
    statusBox.innerText = "❌ " + err.message;
  }
});

// =======================
// INIT
// =======================
loadPostList();
</script>

</body>
</html>
