<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Projects - Kankara LG Portal</title>
<meta name="description" content="Development projects in Kankara Local Government including active, completed and proposed projects.">

<meta property="og:title" content="Projects - Kankara LG">
<meta property="og:description" content="Official government projects in Kankara LG">

<style>
*{box-sizing:border-box;font-family:system-ui}

body{
 margin:0;
 background:#f5f7fa;
}

/* HEADER */
header{
 background:#0b5ed7;
 color:#fff;
 padding:15px;
 display:flex;
 justify-content:space-between;
 align-items:center;
}

header h1{margin:0;font-size:20px}

/* NAV */
nav{
 background:#fff;
 padding:10px;
 display:flex;
 flex-wrap:wrap;
 gap:10px;
}

nav a{
 text-decoration:none;
 color:#0b5ed7;
 font-weight:600;
}

/* CONTAINER */
.container{padding:15px}

/* FILTER */
.filters{
 display:flex;
 flex-wrap:wrap;
 gap:10px;
}

button{
 padding:8px 12px;
 border:none;
 border-radius:20px;
 background:#e0e7ff;
 cursor:pointer;
}

button:hover{
 background:#0b5ed7;
 color:white;
}

/* GRID */
.grid{
 display:grid;
 grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
 gap:15px;
 margin-top:15px;
}

/* CARD */
.card{
 background:#fff;
 border-radius:12px;
 overflow:hidden;
 box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.card img{
 width:100%;
 height:160px;
 object-fit:cover;
}

.card .content{
 padding:10px;
}

/* BADGE */
.badge{
 display:inline-block;
 padding:4px 8px;
 border-radius:10px;
 font-size:12px;
 margin-top:5px;
}

.active{background:#d1fae5}
.completed{background:#e0e7ff}
.proposed{background:#fef3c7}

/* DARK MODE */
body.dark{
 background:#121212;
 color:white;
}

body.dark .card{background:#1e1e1e}
body.dark nav{background:#1e1e1e}
</style>

</head>

<body>

<header>
<h1 id="title">Projects</h1>

<div>
<button onclick="setLang('en')">EN</button>
<button onclick="setLang('ha')">HA</button>
<button onclick="toggleDark()">🌙</button>
</div>
</header>

<nav>
<a href="../index.html">Home</a>
<a href="people.html">People</a>
<a href="projects.html">Projects</a>
<a href="blog.html">News</a>
</nav>

<div class="container">

<div class="filters">
<button onclick="load('all')" id="f1">All</button>
<button onclick="load('active')" id="f2">Active</button>
<button onclick="load('completed')" id="f3">Completed</button>
<button onclick="load('proposed')" id="f4">Proposed</button>
</div>

<div id="box" class="grid"></div>

</div>

<script>

/* =========================
   LANGUAGE
========================= */
const lang = localStorage.getItem("lang") || "en";

function setLang(l){
 localStorage.setItem("lang", l);
 location.reload();
}

/* =========================
   TRANSLATION (DATA)
========================= */
const dict = {
 "Active":"Mai Aiki",
 "Completed":"An Kammala",
 "Proposed":"Ana Shirin Yi"
};

const t = (obj)=>{
 if(typeof obj === "string"){
   return (lang==="ha") ? (dict[obj] || obj) : obj;
 }
 return obj?.[lang] || obj?.en || "";
};

/* =========================
   UI TRANSLATION
========================= */
const UI_LANG = {
 en:{
  title:"Projects",
  all:"All",
  active:"Active",
  completed:"Completed",
  proposed:"Proposed"
 },
 ha:{
  title:"Ayyuka",
  all:"Duka",
  active:"Masu Gudana",
  completed:"An Kammala",
  proposed:"Shirin Yi"
 }
};

function applyLang(){
 const L = UI_LANG[lang];

 document.getElementById("title").innerText = L.title;
 document.getElementById("f1").innerText = L.all;
 document.getElementById("f2").innerText = L.active;
 document.getElementById("f3").innerText = L.completed;
 document.getElementById("f4").innerText = L.proposed;

 document.documentElement.lang = lang;
}

/* =========================
   DARK MODE
========================= */
if(localStorage.getItem("dark")==="1"){
 document.body.classList.add("dark");
}

function toggleDark(){
 const isDark = document.body.classList.toggle("dark");
 localStorage.setItem("dark", isDark ? "1" : "0");
}

/* =========================
   DATA
========================= */
const getData = (key)=>JSON.parse(localStorage.getItem(key)) || [
 {
  title:"School Construction",
  description:"Building new primary school",
  category:"active",
  image:"https://source.unsplash.com/400x300/?school"
 },
 {
  title:"Road Project",
  description:"Road rehabilitation",
  category:"completed",
  image:"https://source.unsplash.com/400x300/?road"
 }
];

/* =========================
   RENDER
========================= */
function render(data){
 document.getElementById("box").innerHTML = data.map(p=>`
  <div class="card">
    <img src="${p.image || 'https://source.unsplash.com/400x300/?project'}" loading="lazy">
    <div class="content">
      <h3>${t(p.title)}</h3>
      <p>${t(p.description)}</p>
      <span class="badge ${p.category}">
        ${t(p.category.charAt(0).toUpperCase()+p.category.slice(1))}
      </span>
    </div>
  </div>
 `).join('');
}

/* =========================
   FILTER
========================= */
function load(c){
 let d = getData("projects");
 if(c!="all") d=d.filter(x=>x.category==c);
 render(d);
}

/* INIT */
applyLang();
load("all");

</script>

</body>
</html>
