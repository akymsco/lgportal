<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>News - Kankara LG</title>
<meta name="description" content="Latest news and updates from Kankara Local Government">
<style>
*{box-sizing:border-box;font-family:system-ui;margin:0;padding:0;}
body{background:#f5f7fa;color:#000;}

/* HEADER */
header{background:#0b5ed7;color:#fff;padding:15px;display:flex;justify-content:space-between;align-items:center;}
.controls button{margin-left:5px;padding:5px 10px;border:none;border-radius:6px;cursor:pointer;}

/* BREAKING NEWS */
.breaking{background:#ff3b3b;color:#fff;padding:8px;overflow:hidden;white-space:nowrap;}
.breaking span{display:inline-block;padding-left:100%;animation:scroll 12s linear infinite;}
@keyframes scroll{0%{transform:translateX(0);}100%{transform:translateX(-100%);}}

/* CONTAINER */
.container{padding:15px;max-width:900px;margin:auto;}

/* SEARCH */
.search-box{margin:10px 0;}
.search-box input{width:100%;padding:10px;border-radius:8px;border:1px solid #ccc;}

/* CARDS */
.card{background:#fff;padding:12px;margin-bottom:12px;border-radius:10px;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,0.1);transition:.2s;}
.card:hover{transform:scale(1.02);}
img{width:100%;border-radius:8px;margin-bottom:8px;}
h3{margin:5px 0;}
.meta{font-size:13px;color:#666;}

/* DARK MODE */
body.dark{background:#121212;color:white;}
body.dark .card{background:#1e1e1e;}
body.dark .meta{color:#ccc;}
</style>
</head>

<body>

<!-- 🚨 BREAKING -->
<div class="breaking">
<span>🚨 Chairman flags off road project • New hospital commissioned • Education support launched</span>
</div>

<header>
<h2>📰 News</h2>
<div class="controls">
<button onclick="setLang('en')">EN</button>
<button onclick="setLang('ha')">HA</button>
<button onclick="toggleDark()">🌙</button>
</div>
</header>

<div class="container">

<!-- 🔎 SEARCH -->
<div class="search-box">
<input id="searchInput" type="text" placeholder="Search news...">
</div>

<!-- 🔥 TRENDING -->
<h3>🔥 Trending</h3>
<div id="trendingBox"></div>

<!-- 📰 ALL NEWS -->
<h3 style="margin-top:15px;">Latest News</h3>
<div id="newsBox"></div>

</div>

<script>
// =======================
// LANGUAGE
// =======================
const lang = localStorage.getItem("lang") || "en";
function setLang(l){ localStorage.setItem("lang",l); location.reload(); }

// =======================
// DARK MODE
// =======================
if(localStorage.getItem("dark")==="1"){document.body.classList.add("dark");}
function toggleDark(){ const d=document.body.classList.toggle("dark"); localStorage.setItem("dark",d?"1":"0"); }

// =======================
// FETCH NEWS JSON
// =======================
let NEWS = [];

async function loadNews(){
  try{
    const res = await fetch("news.json");
    NEWS = await res.json();
    renderTrending();
    renderNews();
  } catch(err){
    console.error("Error loading news:",err);
    document.getElementById("newsBox").innerHTML = "<p>Error loading news</p>";
  }
}

// =======================
// TRENDING
// =======================
function renderTrending(){
  let views = JSON.parse(localStorage.getItem("newsViews")||"{}");
  let top = [...NEWS].sort((a,b)=> (views[b.id]||0)-(views[a.id]||0)).slice(0,3);
  let html="";
  top.forEach(n=>{
    html += `
      <div class="card" onclick="openNews(${n.id})">
        <img src="${n.img}">
        <h3>${n.title[lang]}</h3>
        <div class="meta">🔥 ${views[n.id]||0} views</div>
      </div>`;
  });
  document.getElementById("trendingBox").innerHTML = html;
}

// =======================
// ALL NEWS + SEARCH
// =======================
function renderNews(){
  let search = document.getElementById("searchInput").value.toLowerCase();
  let sorted = [...NEWS].sort((a,b)=> new Date(b.date)-new Date(a.date));
  let filtered = sorted.filter(n=> n.title[lang].toLowerCase().includes(search));
  let html="";
  filtered.forEach(n=>{
    html += `
      <div class="card" onclick="openNews(${n.id})">
        <img src="${n.img}">
        <h3>${n.title[lang]}</h3>
        <div class="meta">📅 ${n.date}</div>
      </div>`;
  });
  document.getElementById("newsBox").innerHTML = html;
}

// =======================
// OPEN NEWS
// =======================
function openNews(id){
  window.location.href = "details.html?id="+id;
}

// =======================
// SEARCH EVENT
// =======================
document.getElementById("searchInput").addEventListener("input",renderNews);

// =======================
// INIT
// =======================
loadNews();
</script>

</body>
</html>
