<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>News Details</title>
<meta name="description" content="">

<style>
*{box-sizing:border-box;font-family:system-ui;margin:0;padding:0;}
body{background:#f5f7fa;color:#000;line-height:1.6;}

/* HEADER */
header{background:#0b5ed7;color:#fff;padding:15px;display:flex;justify-content:space-between;align-items:center;}
header h2{font-size:18px;}
.controls button{margin-left:5px;padding:5px 10px;border:none;border-radius:6px;cursor:pointer;}

/* CONTAINER */
.container{max-width:800px;margin:auto;padding:15px;}

/* BREADCRUMB */
.breadcrumb{font-size:14px;margin-bottom:10px;}
.breadcrumb a{text-decoration:none;color:#0b5ed7;margin-right:5px;}
.breadcrumb span{color:#666;}

/* POST */
.post img{width:100%;border-radius:10px;margin:15px 0;}
.post h1{font-size:24px;margin-bottom:10px;}
.meta{font-size:13px;color:#666;margin-bottom:15px;}

/* SOCIAL */
.social a{margin-right:10px;font-size:20px;text-decoration:none;}

/* DARK MODE */
body.dark{background:#121212;color:white;}
body.dark .meta{color:#ccc;}
body.dark .breadcrumb a{color:#66aaff;}
</style>
</head>

<body>

<header>
<h2>📰 News Details</h2>
<div class="controls">
<button onclick="setLang('en')">EN</button>
<button onclick="setLang('ha')">HA</button>
<button onclick="toggleDark()">🌙</button>
</div>
</header>

<div class="container">

<!-- Breadcrumb -->
<div class="breadcrumb">
<a href="../../index.html">Home</a> <span>›</span> 
<a href="../blog.html">Blog</a> <span>›</span> 
<a href="news.html">News</a> <span>›</span>
<span id="crumbTitle">Details</span>
</div>

<!-- POST CONTENT -->
<div class="post" id="newsBox">
<p>Loading...</p>
</div>

<!-- SOCIAL SHARE -->
<div class="social" style="margin-top:20px;">
<a href="#" id="shareTwitter">🐦 Twitter</a>
<a href="#" id="shareFacebook">📘 Facebook</a>
<a href="#" id="shareLinkedIn">🔗 LinkedIn</a>
</div>

</div>

<script>
// =======================
// LANGUAGE
// =======================
const lang = localStorage.getItem("lang") || "en";
function setLang(l){ localStorage.setItem("lang",l); location.reload(); }

// =======================
// DARK MODE
// =======================
if(localStorage.getItem("dark")==="1"){document.body.classList.add("dark");}
function toggleDark(){ const d=document.body.classList.toggle("dark"); localStorage.setItem("dark",d?"1":"0"); }

// =======================
// QUERY PARAM
// =======================
const params = new URLSearchParams(window.location.search);
const id = parseInt(params.get("id"));

// =======================
// NEWS DATA
// =======================
const NEWS = [
{id:1,title:{en:"Chairman Flags Off Road Project",ha:"An fara aikin hanya"},content:{en:"Full details of road project in Kankara LG...",ha:"Cikakken bayani game da aikin hanya..."},img:"../../assets/images/road.jpg",date:"2026-02-01"},
{id:2,title:{en:"New Health Center Commissioned",ha:"An bude asibiti"},content:{en:"Details about new health facility...",ha:"Cikakken bayani game da sabon asibiti..."},img:"../../assets/images/health.jpg",date:"2026-02-10"},
{id:3,title:{en:"Education Support Program Launched",ha:"Shirin tallafi na ilimi"},content:{en:"Education support initiative details...",ha:"Cikakken bayani game da shirin tallafi..."},img:"../../assets/images/school.jpg",date:"2026-03-01"}
];

// =======================
// FIND POST
// =======================
const post = NEWS.find(n=>n.id===id);

// =======================
// VIEW COUNTER
// =======================
function addView(id){
 let views = JSON.parse(localStorage.getItem("newsViews") || "{}");
 views[id] = (views[id] || 0) + 1;
 localStorage.setItem("newsViews", JSON.stringify(views));
}

// =======================
// RENDER POST
// =======================
function render(){
 if(!post){
  document.getElementById("newsBox").innerHTML = "<p>News not found</p>";
  return;
 }

addView(post.id);

// UPDATE SEO
document.title = post.title[lang]+" - Kankara LG";
document.querySelector('meta[name="description"]').setAttribute("content", post.content[lang].slice(0,150));

// UPDATE BREADCRUMB
document.getElementById("crumbTitle").innerText = post.title[lang];

// RENDER CONTENT
document.getElementById("newsBox").innerHTML = `
 <h1>${post.title[lang]}</h1>
 <div class="meta">📅 ${post.date}</div>
 <img src="${post.img}" alt="${post.title[lang]}">
 <p>${post.content[lang]}</p>
`;

// SOCIAL LINKS
const pageUrl = encodeURIComponent(window.location.href);
const postTitle = encodeURIComponent(post.title[lang]);
document.getElementById("shareTwitter").href = `https://twitter.com/intent/tweet?text=${postTitle}&url=${pageUrl}`;
document.getElementById("shareFacebook").href = `https://www.facebook.com/sharer/sharer.php?u=${pageUrl}`;
document.getElementById("shareLinkedIn").href = `https://www.linkedin.com/shareArticle?mini=true&url=${pageUrl}&title=${postTitle}`;
}

// INIT
render();
</script>

</body>
</html>
