<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Post</title>

<style>
*{box-sizing:border-box;font-family:system-ui;margin:0;padding:0;}
body{background:#f5f7fa;color:#000;}
header{background:#0b5ed7;color:#fff;padding:15px;display:flex;justify-content:space-between;align-items:center;}
header h1{font-size:18px;}
.controls button{margin-left:5px;padding:5px 10px;border:none;border-radius:6px;cursor:pointer;}
.container{padding:15px;max-width:800px;margin:auto;}
.back{display:inline-block;margin-bottom:15px;text-decoration:none;color:#0b5ed7;font-weight:bold;}
.meta{font-size:13px;color:#666;margin-bottom:10px;}
img{width:100%;border-radius:10px;margin:15px 0;}
h2{margin-bottom:10px;}
p{line-height:1.6;margin-bottom:10px;}
.actions{margin-top:15px;display:flex;gap:10px;}
.actions button{padding:6px 12px;border:none;border-radius:6px;background:#0b5ed7;color:#fff;cursor:pointer;}
body.dark{background:#121212;color:white;}
body.dark .meta{color:#ccc;}

.breadcrumb{
font-size:14px;
margin-bottom:10px;
}

.breadcrumb a{
text-decoration:none;
color:#0b5ed7;
font-weight:600;
}

.breadcrumb span{
color:#666;
margin:0 5px;
}

body.dark .breadcrumb a{color:#66aaff;}
body.dark .breadcrumb span{color:#aaa;}
</style>
</head>

<body>

<header>
<h1 id="headerTitle">Post</h1>
<div class="controls">
<button onclick="setLang('en')">EN</button>
<button onclick="setLang('ha')">HA</button>
<button onclick="toggleDark()">🌙</button>
</div>
</header>

<div class="container">

<div class="breadcrumb">
<a href="../index.html">Home</a>
<span>›</span>
<a href="news.html">News</a>
<span>›</span>
<span id="crumbTitle">Post</span>
</div>

<a href="news.html" class="back" id="backBtn">← Back</a>

<div id="postBox"></div>

</div>

<script>
// =======================
// LANGUAGE
// =======================
const lang = localStorage.getItem("lang") || "en";

function setLang(l){ 
  localStorage.setItem("lang",l); 
  location.reload(); 
}

const TEXT = {
 en:{header:"Blog Post", back:"← Back to News", share:"Share", copied:"Link copied!"},
 ha:{header:"Cikakken Labari", back:"← Komawa", share:"Raba", copied:"An kwafi link!"}
};

document.getElementById("headerTitle").innerText = TEXT[lang].header;
document.getElementById("backBtn").innerText = TEXT[lang].back;
document.documentElement.lang = lang;

// =======================
// DARK MODE
// =======================
if(localStorage.getItem("dark")==="1"){
  document.body.classList.add("dark");
}

function toggleDark(){ 
  const d = document.body.classList.toggle("dark"); 
  localStorage.setItem("dark", d?"1":"0"); 
}

// =======================
// GET SLUG FROM URL
// =======================
function getSlug(){
  const params = new URLSearchParams(window.location.search);
  return params.get("slug");
}

// =======================
// LOAD POST FROM GITHUB JSON
// =======================
async function loadPost(){

  const slug = getSlug();

  if(!slug){
    document.getElementById("postBox").innerHTML = "<p>No post found</p>";
    return;
  }

  try{
    const res = await fetch(`news/${slug}.json`);
    const post = await res.json();

    document.title = post.title;
    document.getElementById("crumbTitle").innerText = post.title;

    // increase views
    let views = JSON.parse(localStorage.getItem("newsViews")||"{}");
    views[slug] = (views[slug]||0) + 1;
    localStorage.setItem("newsViews", JSON.stringify(views));

    document.getElementById("postBox").innerHTML = `
      <h2>${post.title}</h2>
      <div class="meta">📅 ${new Date(post.date).toDateString()}</div>
      ${post.image ? `<img src="${post.image}">` : ""}
      <p>${post.content}</p>

      <div class="actions">
        <button onclick="sharePost()">${TEXT[lang].share}</button>
      </div>
    `;

  } catch(err){
    document.getElementById("postBox").innerHTML = "<p>Error loading post</p>";
    console.error(err);
  }
}

// =======================
// SHARE FUNCTION
// =======================
function sharePost(){
  const url = window.location.href;

  navigator.clipboard.writeText(url);
  alert(TEXT[lang].copied);
}

// =======================
// INIT
// =======================
loadPost();
</script>

</body>
</html>
